spring.application.name=vendor-service
server.port=9090
# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/buildledgervendor
spring.datasource.username=root
spring.datasource.password=11092004

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Local File Storage Base Path
app.file-storage.base-path=uploads

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/api-docs
