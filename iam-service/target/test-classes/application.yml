spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  mail:
    host: smtp.example.com
    port: 587
    username: test@example.com
    password: test

jwt:
  secret: TestSecretKeyForBuildLedgerIAMServiceJunitTests2024SecureEnough
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
  issuer: buildledger-iam-test

admin:
  bootstrap:
    email: admin@test.com
    password: Test@1234!
    name: Test Admin

rate-limit:
  login:
    capacity: 100
    refill-duration-minutes: 1

file:
  storage:
    base-path: ./target/test-uploads

logging:
  level:
    com.buildledger.iam: WARN
